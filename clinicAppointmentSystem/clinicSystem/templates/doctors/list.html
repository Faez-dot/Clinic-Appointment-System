<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Doctors</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>Doctors</h1>
            <p>Manage doctor records</p>
        </header>

        <div class="toolbar">
            <h2>Doctor List</h2>
            <a class="btn btn-primary" href="/doctors/add/">Add Doctor</a>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for doctor in doctors %}
                        <tr>
                            <td>{{ doctor.name }}</td>
                            <td>{{ doctor.phone }}</td>
                            <td>{{ doctor.email }}</td>
                            <td>
                                <a class="btn btn-edit" href="/doctors/{{ doctor.pk }}/edit/">Edit</a>
                                <a class="btn btn-delete" href="/doctors/{{ doctor.pk }}/delete/">Delete</a>
                            </td>
                        </tr>
                    {% empty %}
                        <tr>
                            <td colspan="4">No doctors found.</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
